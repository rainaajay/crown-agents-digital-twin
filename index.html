<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crown Agents Bank — Economic Digital Twin</title>
<style>
:root{
  --bg:#070a10; --bg2:#0b101a; --panel:#0e1521; --panel2:#121b2b; --line:#1c2troubled;
  --line:#1b2536; --line2:#26344a;
  --ink:#e8eef7; --ink2:#9fb0c7; --ink3:#5f7characterpr;
  --ink3:#647890;
  --gold:#f5b942; --gold2:#caa14a;
  --teal:#34d3c4; --cyan:#3fa9ff; --violet:#9b7bff;
  --pos:#37d39a; --posdim:#1f6b54; --neg:#ff5d6c; --negdim:#7a2b35; --warn:#ffb13d;
  --mono:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace;
  --sans:'Inter','Segoe UI',system-ui,-apple-system,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:13px;-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column;overflow:hidden}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:#1d2troubled;background:#1d293b;border-radius:6px}
::-webkit-scrollbar-track{background:transparent}
.mono{font-family:var(--mono)}
.pos{color:var(--pos)} .neg{color:var(--neg)} .gold{color:var(--gold)} .dim{color:var(--ink2)} .dim3{color:var(--ink3)}

/* ---------- top bar ---------- */
#topbar{height:54px;flex:0 0 54px;display:flex;align-items:center;gap:16px;padding:0 16px;
  background:linear-gradient(180deg,#0c121d,#080c14);border-bottom:1px solid var(--line2);z-index:50}
.brand{display:flex;align-items:center;gap:11px;min-width:240px}
.crest{width:30px;height:30px;border-radius:6px;background:radial-gradient(circle at 30% 25%,#f7cd6b,#b9882a 70%);
  display:flex;align-items:center;justify-content:center;color:#2a1c00;font-weight:800;font-size:14px;box-shadow:0 0 18px rgba(245,185,66,.35)}
.brand h1{font-size:13.5px;margin:0;letter-spacing:.3px;font-weight:700}
.brand .sub{font-size:10px;color:var(--ink3);letter-spacing:2.5px;text-transform:uppercase;margin-top:1px}

/* command bar */
#cmdwrap{flex:1;max-width:680px;position:relative}
#cmd{width:100%;height:34px;background:#070b12;border:1px solid var(--line2);border-radius:7px;color:var(--ink);
  font-family:var(--mono);font-size:12.5px;padding:0 12px 0 34px;outline:none}
#cmd:focus{border-color:var(--gold);box-shadow:0 0 0 1px rgba(245,185,66,.25)}
#cmdwrap .ic{position:absolute;left:11px;top:9px;color:var(--gold);font-size:13px}
#cmdwrap .hint{position:absolute;right:10px;top:9px;color:var(--ink3);font-size:10px;letter-spacing:.5px}

.toggle{display:flex;background:#070b12;border:1px solid var(--line2);border-radius:7px;overflow:hidden}
.toggle button{background:transparent;border:0;color:var(--ink2);padding:7px 13px;font-size:11px;cursor:pointer;font-weight:600;letter-spacing:.4px}
.toggle button.on{background:linear-gradient(180deg,#f5b942,#cf9a2c);color:#241900}
.deskstat{display:flex;align-items:center;gap:7px;font-size:10.5px;color:var(--ink2);min-width:150px;justify-content:flex-end}
.dot{width:7px;height:7px;border-radius:50%;background:var(--pos);box-shadow:0 0 8px var(--pos)}
.clock{font-family:var(--mono);color:var(--ink);font-size:12px}

/* ---------- kpi strip ---------- */
#kpis{flex:0 0 64px;display:flex;background:#0a0f18;border-bottom:1px solid var(--line);overflow:hidden}
.kpi{flex:1;padding:9px 14px;border-right:1px solid var(--line);display:flex;flex-direction:column;justify-content:center;min-width:0;position:relative;cursor:default}
.kpi .k{font-size:9.5px;color:var(--ink3);letter-spacing:1.4px;text-transform:uppercase;white-space:nowrap}
.kpi .v{font-family:var(--mono);font-size:20px;font-weight:600;margin-top:2px;line-height:1}
.kpi .d{font-size:10.5px;margin-top:3px;font-family:var(--mono)}
.kpi.flash{animation:flash .6s ease}
@keyframes flash{0%{background:rgba(245,185,66,.16)}100%{background:transparent}}

/* ---------- layout ---------- */
#shell{flex:1;display:flex;min-height:0}
#nav{flex:0 0 212px;background:#090d15;border-right:1px solid var(--line);overflow-y:auto;padding:8px 0}
.navsec{font-size:9px;color:var(--ink3);letter-spacing:1.6px;padding:12px 16px 5px;text-transform:uppercase}
.navitem{display:flex;align-items:center;gap:10px;padding:8px 16px;cursor:pointer;border-left:2px solid transparent;color:var(--ink2);font-size:12.5px}
.navitem:hover{background:#0d1521;color:var(--ink)}
.navitem.on{background:linear-gradient(90deg,rgba(245,185,66,.13),transparent);border-left-color:var(--gold);color:#fff;font-weight:600}
.navitem .lv{font-family:var(--mono);font-size:9.5px;color:var(--ink3);width:18px}
.navitem.on .lv{color:var(--gold)}
.navtoggle{display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.navtoggle:hover{color:var(--ink2)}
.caret{font-size:9px;color:var(--ink3);letter-spacing:0}
.rsec{display:flex;justify-content:space-between;align-items:center;cursor:pointer;padding:3px 0}
.rsec:hover .caret{color:var(--gold)}
.ctxcard{border-left:3px solid var(--gold)!important}
#crumb{font-size:11px;color:var(--ink2);font-family:var(--mono);white-space:nowrap;padding-right:4px}

#main{flex:1;overflow-y:auto;padding:18px 20px 60px;min-width:0;position:relative}
#right{flex:0 0 270px;background:#090d15;border-left:1px solid var(--line);overflow-y:auto;padding:14px 14px 40px}

/* ---------- generic ---------- */
.row{display:flex;gap:14px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px 16px;min-width:0}
.card.hero{background:linear-gradient(160deg,#101a2b,#0a111c);border-color:var(--line2)}
.ch{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px}
.ch h3{margin:0;font-size:12px;letter-spacing:.6px;font-weight:700;color:var(--ink)}
.ch .meta{font-size:10px;color:var(--ink3);font-family:var(--mono)}
.tag{display:inline-block;font-size:9.5px;padding:2px 7px;border-radius:4px;font-family:var(--mono);letter-spacing:.4px}
.tag.pos{background:rgba(55,211,154,.14);color:var(--pos)}
.tag.neg{background:rgba(255,93,108,.14);color:var(--neg)}
.tag.gold{background:rgba(245,185,66,.14);color:var(--gold)}
.tag.blue{background:rgba(63,169,255,.14);color:var(--cyan)}
.viewhead{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:16px}
.viewhead h2{margin:0;font-size:19px;font-weight:700;letter-spacing:.2px}
.viewhead .lead{font-size:18px}
.viewhead p{margin:4px 0 0;color:var(--ink2);font-size:12px;max-width:680px}
.kicker{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:5px}

table{width:100%;border-collapse:collapse;font-size:11.5px}
th{text-align:right;font-weight:600;color:var(--ink3);font-size:9.5px;letter-spacing:.8px;text-transform:uppercase;padding:7px 9px;border-bottom:1px solid var(--line2);white-space:nowrap}
th.l,td.l{text-align:left}
td{padding:7px 9px;border-bottom:1px solid var(--line);font-family:var(--mono);white-space:nowrap}
tr.clk{cursor:pointer}
tr.clk:hover td{background:#101a29}
.bar-cell{position:relative}
.minibar{height:5px;border-radius:3px;display:inline-block;vertical-align:middle}

.stat{display:flex;flex-direction:column;gap:2px}
.stat .lab{font-size:9.5px;color:var(--ink3);letter-spacing:1px;text-transform:uppercase}
.stat .num{font-family:var(--mono);font-size:22px;font-weight:600}
.stat .sub{font-size:10.5px;color:var(--ink2);font-family:var(--mono)}

/* levers */
.lever{margin-bottom:15px}
.lever .lh{display:flex;justify-content:space-between;font-size:11px;margin-bottom:5px}
.lever .lh .lv{font-family:var(--mono);color:var(--gold);font-weight:600}
.lever input[type=range]{width:100%;-webkit-appearance:none;height:4px;border-radius:3px;background:#1d293b;outline:none}
.lever input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#f7cd6b,#c9962b);cursor:pointer;box-shadow:0 0 10px rgba(245,185,66,.5)}
.lever .lr{display:flex;justify-content:space-between;font-size:9px;color:var(--ink3);margin-top:2px;font-family:var(--mono)}
.actrow{display:flex;align-items:flex-start;gap:9px;padding:9px 0;border-bottom:1px solid var(--line)}
.actrow .chk{flex:0 0 16px;height:16px;border:1.5px solid var(--line2);border-radius:4px;margin-top:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:#241900}
.actrow .chk.on{background:var(--gold);border-color:var(--gold)}
.actrow .at{flex:1}
.actrow .at .t{font-size:11.5px;font-weight:600}
.actrow .at .d{font-size:10px;color:var(--ink3);margin-top:1px;font-family:var(--mono)}
.btn{background:#16213280;border:1px solid var(--line2);color:var(--ink);padding:7px 12px;border-radius:6px;font-size:11px;cursor:pointer;font-weight:600}
.btn:hover{border-color:var(--gold);color:#fff}
.btn.gold{background:linear-gradient(180deg,#f5b942,#cf9a2c);color:#241900;border:0}
.btn.sm{padding:4px 9px;font-size:10px}

/* twin console */
#console{position:fixed;right:18px;bottom:18px;width:430px;max-height:62vh;background:#0b1119f0;backdrop-filter:blur(8px);
  border:1px solid var(--line2);border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,.6);display:none;flex-direction:column;z-index:80}
#console.open{display:flex}
#console .ch{padding:11px 14px;border-bottom:1px solid var(--line);margin:0;display:flex;justify-content:space-between;align-items:center}
#console .body{padding:12px 14px;overflow-y:auto}
#console .q{font-size:11px;color:var(--gold);font-family:var(--mono);margin:10px 0 4px}
#console .a{font-size:12px;color:var(--ink);line-height:1.55}
#console .a b{color:#fff} #console .a .k{color:var(--cyan);font-family:var(--mono)}
.suggest{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.chip{background:#13203180;border:1px solid var(--line2);color:var(--ink2);font-size:10.5px;padding:4px 9px;border-radius:20px;cursor:pointer}
.chip:hover{border-color:var(--gold);color:#fff}

/* map */
.maplabel{font-size:9px;fill:var(--ink2);font-family:var(--mono)}
.flow{stroke-dasharray:5 7;animation:flow 1.1s linear infinite}
@keyframes flow{to{stroke-dashoffset:-24}}
.node{cursor:pointer}
.node circle.core{transition:r .2s}
.pulse{transform-box:fill-box;transform-origin:center;animation:pulse 2.4s ease-out infinite}
@keyframes pulse{0%{opacity:.6;r:4}70%{opacity:0;r:16}100%{opacity:0}}
.legend{display:flex;gap:16px;font-size:10px;color:var(--ink2);margin-top:8px;flex-wrap:wrap}
.legend span{display:flex;align-items:center;gap:5px}
.sw{width:18px;height:3px;border-radius:2px}

.note{font-size:12px;line-height:1.6;color:var(--ink2)}
.note b{color:#fff} .note .k{color:var(--cyan);font-family:var(--mono)}
.divider{height:1px;background:var(--line);margin:14px 0}
.pill{font-size:9.5px;font-family:var(--mono);padding:2px 7px;border-radius:10px;background:#15212f;color:var(--ink2)}
.flowtag{font-size:10px;color:var(--ink3);font-family:var(--mono)}
.scenbadge{font-size:10px;font-family:var(--mono);color:var(--ink3)}
.scenbadge b{color:var(--gold)}
.barlabel{font-size:10px;fill:var(--ink2);font-family:var(--mono)}
.axis{stroke:var(--line2);stroke-width:1}
.gridln{stroke:var(--line);stroke-width:1;stroke-dasharray:2 4}
.svgnum{font-family:var(--mono);font-size:10px;fill:var(--ink)}
.wf-conn{stroke:var(--ink3);stroke-width:1;stroke-dasharray:2 3}
/* top tabs + clean full-width layout */
#tabs{flex:1;display:flex;gap:4px;align-items:center;margin-left:14px}
.tab{padding:9px 17px;font-size:13px;color:var(--ink2);cursor:pointer;border-radius:8px;font-weight:600;letter-spacing:.2px}
.tab:hover{background:#0e1521;color:var(--ink)}
.tab.on{background:#121b2b;color:#fff;box-shadow:inset 0 -2px 0 var(--gold)}
.asof{font-size:11px;color:var(--ink3);font-family:var(--mono);white-space:nowrap}
.actpick{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);cursor:pointer}
.actpick .chk{flex:0 0 17px;height:17px;border:1.5px solid var(--line2);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#241900}
.actpick .chk.on{background:var(--gold);border-color:var(--gold)}
</style>
</head>

function corridorEP(c, vf, marginScale, act){
  act = act || applied;
  // c array indices: 5 vol,6 rev,7 opc,8 comp,9 liq,10 cap,11 settleH,12 failPct
  let rev = c[6]*marginScale*vf;
  let cost = (c[7]+c[8]+c[9])*(0.5+0.5*vf);
  let cap = c[10];
  // action overlays affecting specific corridors
  if(act.reprice && [ "NGN","GHS","CDF","SLE","PGK","ZMW" ].includes(c[2])) rev += rev*0.16;
  let ep = rev - cost - cap*COE;
  return {rev,cost,cap,ep};
}
function clientEP(cl, act){
  act = act || applied;
  if(act.exitmto && cl[0].startsWith("Sub-scale")) return null;
  if(act.exitgov && cl[0].startsWith("Legacy Government")) return null;
  let ep = cl[2]-cl[3]-cl[4]*COE;
  return {rev:cl[2],cost:cl[3],cap:cl[4],liq:cl[5],ep};
}
function compute(scn, act){
  scn = scn || scenario; act = act || applied;
  const s=scn, B=BASE;
  const vf = 1+s.volumeGrowthPct/100;
  const marginScale = s.fxMarginBps/B.baseMarginBps;
  // ---- income (£m) ----
  let fx = B.fxVolBn*1000*(s.fxMarginBps/10000)*vf;            // £41.9bn × bps
  let payments = B.payments*vf;
  let trade = B.trade*(1+0.6*(vf-1));
  let nii = B.nii + (s.rateShiftBps/10000)*B.rateSensitive;    // rate sensitivity on earning assets
  let liqUplift = B.trappedM*(s.liquidityReleasePct/100)*0.03; // redeploy trapped balances into earning assets
  nii += liqUplift;
  let im = B.im;
  // ---- executive actions ----
  let actRev=0, actCost=0, actCap=0;
  for(const a of ACTIONS){ if(act[a[0]]){ actRev+=a[3]; actCost+=a[4]; actCap+=a[5]; } }
  let income = fx+payments+trade+nii+im+actRev;
  // ---- operating cost stack (cash opex) ----
  let staff = B.staff*(1+0.15*(vf-1));                          // mostly fixed, partly volume-linked
  let tech  = B.tech*(1+0.10*(vf-1));
  let premises = B.premises;
  let compliance = B.compliance*(1-0.006*s.complianceAutomationPct); // automation lever (up to ~48% cut)
  let network = B.network*(0.5+0.5*vf);                         // SWIFT / settlement / correspondent fees
  let cashOpex = staff+tech+premises+compliance+network+actCost;
  // ---- earnings ----
  let ebitda = income - cashOpex;
  let amort=B.amort, da=B.da, adjusting=B.adjusting;
  let pbt = ebitda - amort - da - adjusting;                    // intangible amort + D&A + adjusting items
  let tax = Math.max(0,pbt)*TAXR;
  let netProfit = pbt - tax;
  // ---- returns & economic profit ----
  let equity = B.equity + actCap;
  let roe = netProfit/equity;
  let rote = netProfit/(B.tangEquity + actCap);
  let capitalCharge = COE*equity;                              // cost of equity × capital employed
  let ep = netProfit - capitalCharge;                          // ≡ (ROE − CoE) × equity
  let cir = (staff+tech+premises+compliance+network+amort+da)/income;
  let ebitdaMargin = ebitda/income;
  // ---- valuation ----
  const mult = valMode==="engine" ? {lo:10,base:12,hi:15} : {lo:4.5,base:5.8,hi:7};
  let val = {lo:ebitda*mult.lo, base:ebitda*mult.base, hi:ebitda*mult.hi, mult};
  // ---- segment economic profit ----
  const vfc=vf, ms=marginScale;
  let corr = CORRIDORS.map(c=>{const r=corridorEP(c,vfc,ms,act);return {c,...r};});
  let clients = CLIENTS.map(cl=>({cl,r:clientEP(cl,act)})).filter(x=>x.r).map(x=>({cl:x.cl,...x.r}));
  return {fx,payments,trade,nii,im,liqUplift,income,
    staff,tech,premises,compliance,network,cashOpex,amort,da,adjusting,
    ebitda,ebitdaMargin,pbt,tax,netProfit,equity,roe,rote,capitalCharge,ep,cir,val,corr,clients,
    vf,marginScale,actRev,actCost,actCap};
}

function hbars(items,opts={}){
  // items: {label,value,color, sub}
  const W=opts.w||520, rowH=opts.rowH||26, pad=opts.labelW||150;
  const H=items.length*rowH+10;
  const max=Math.max(...items.map(i=>Math.abs(i.value)))*1.08||1;
  const zero = opts.diverging ? pad+(W-pad-70)*0.5 : pad;
  const span = opts.diverging ? (W-pad-70)/2 : (W-pad-70);
  let s=`<svg viewBox="0 0 ${W} ${H}" width="100%">`;
  items.forEach((it,i)=>{
    const y=i*rowH+6, v=it.value;
    let x,w;
    if(opts.diverging){ w=Math.abs(v)/max*span; x=v>=0?zero:zero-w; }
    else { w=Math.abs(v)/max*span; x=zero; }
    const col=it.color||(v>=0?"var(--pos)":"var(--neg)");
    s+=`<text class="barlabel" x="${pad-8}" y="${y+13}" text-anchor="end" style="fill:var(--ink)">${it.label}</text>`;
    s+=`<rect x="${x}" y="${y+3}" width="${Math.max(w,1)}" height="${rowH-12}" rx="3" fill="${col}" opacity="0.85"/>`;
    s+=`<text class="svgnum" x="${(opts.diverging?(v>=0?x+w+5:x-5):x+w+6)}" y="${y+13}" text-anchor="${opts.diverging&&v<0?'end':'start'}" style="fill:${col}">${it.disp||F.signm(v)}</text>`;
  });
  if(opts.diverging) s+=`<line class="axis" x1="${zero}" y1="0" x2="${zero}" y2="${H-4}"/>`;
  return s+`</svg>`;
}

function waterfall(items,opts={}){
  // items: {label,value,type:'start'|'delta'|'end'}
  const W=opts.w||560,H=opts.h||230,padB=42,padT=14,padL=10,padR=10;
  let cum=0, vals=[];
  items.forEach(it=>{
    if(it.type==='start'||it.type==='end'){ vals.push({...it,base:0,top:it.value}); cum=it.value; }
    else { vals.push({...it,base:cum,top:cum+it.value}); cum+=it.value; }
  });
  const all=vals.flatMap(v=>[v.base,v.top]);
  const mx=Math.max(...all,0), mn=Math.min(...all,0);
  const range=(mx-mn)||1;
  const plotH=H-padB-padT, plotW=W-padL-padR;
  const bw=plotW/items.length*0.6, gap=plotW/items.length;
  const Y=v=>padT+plotH*(1-(v-mn)/range);
  let s=`<svg viewBox="0 0 ${W} ${H}" width="100%">`;
  s+=`<line class="axis" x1="${padL}" y1="${Y(0)}" x2="${W-padR}" y2="${Y(0)}"/>`;
  vals.forEach((v,i)=>{
    const cx=padL+gap*i+gap/2, x=cx-bw/2;
    const yT=Y(Math.max(v.base,v.top)), h=Math.abs(Y(v.base)-Y(v.top));
    let col= v.type==='start'?'var(--cyan)': v.type==='end'?'var(--gold)':(v.value>=0?'var(--pos)':'var(--neg)');
    s+=`<rect x="${x}" y="${yT}" width="${bw}" height="${Math.max(h,1)}" rx="2.5" fill="${col}" opacity="0.88"/>`;
    if(i<vals.length-1){const ny=Y(vals[i+1].type==='end'?0:vals[i].top===undefined?0:vals[i].top);}
    const lblv = v.type==='delta'?F.signm(v.value):F.m(v.value);
    s+=`<text class="svgnum" x="${cx}" y="${yT-5}" text-anchor="middle" style="fill:${col};font-size:9.5px">${lblv}</text>`;
    s+=`<text class="barlabel" x="${cx}" y="${H-26}" text-anchor="middle" style="font-size:9px">${wrapLbl(v.label)}</text>`;
    // connector
    if(i<vals.length-1 && v.type!=='end'){ const yc=Y(v.top); s+=`<line class="wf-conn" x1="${cx+bw/2}" y1="${yc}" x2="${cx+gap-bw/2}" y2="${yc}"/>`; }
  });
  return s+`</svg>`;
}
function wrapLbl(l){ return l.length<=13 ? l : l.slice(0,12)+'…'; }

function donut(items,opts={}){
  const sz=opts.sz||150, r=sz/2-6, ir=r*0.62, cx=sz/2, cy=sz/2;
  const tot=items.reduce((a,b)=>a+b.value,0)||1;
  let ang=-Math.PI/2, s=`<svg viewBox="0 0 ${sz} ${sz}" width="${sz}" height="${sz}">`;
  items.forEach(it=>{
    const a2=ang+it.value/tot*Math.PI*2;
    const x1=cx+r*Math.cos(ang),y1=cy+r*Math.sin(ang),x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
    const xi1=cx+ir*Math.cos(a2),yi1=cy+ir*Math.sin(a2),xi2=cx+ir*Math.cos(ang),yi2=cy+ir*Math.sin(ang);
    const large=(a2-ang)>Math.PI?1:0;
    s+=`<path d="M${x1} ${y1} A${r} ${r} 0 ${large} 1 ${x2} ${y2} L${xi1} ${yi1} A${ir} ${ir} 0 ${large} 0 ${xi2} ${yi2} Z" fill="${it.color}" opacity="0.9"/>`;

  return s+`</svg>`;
}

  corr.forEach(o=>{
    const c=o.c; const [x1,y1]=proj(c[3],W,H),[x2,y2]=proj(c[4],W,H);
    const mx=(x1+x2)/2,my=(y1+y2)/2; const dx=x2-x1,dy=y2-y1; const dist=Math.hypot(dx,dy);
    const cx=mx - dy*0.22, cy=my + dx*0.22 - dist*0.12;
    const col=o.ep>=0?"#37d39a":"#ff5d6c";
    const wdt=1+ (c[5]/maxVol)*4.5;
    const opa=0.25+0.6*(Math.abs(o.ep)/maxEP);
    const sel = selectedCorridor===corr.indexOf(o);
    s+=`<path d="M${x1} ${y1} Q${cx} ${cy} ${x2} ${y2}" fill="none" stroke="${col}" stroke-width="${sel?wdt+1.5:wdt}" opacity="${sel?0.95:opa}" class="flow" style="cursor:pointer" onclick="selectCorridor(${corr.indexOf(o)})"/>`;
  });
  // nodes
  const seen=new Set();
  corr.forEach(o=>{ [o.c[3],o.c[4]].forEach(h=>{ if(seen.has(h))return; seen.add(h);
    const [x,y]=proj(h,W,H); const isHQ=h==="London";
    s+=`<circle class="pulse" cx="${x}" cy="${y}" r="4" fill="${isHQ?'#f5b942':'#3fa9ff'}"/>`;
    s+=`<circle class="core" cx="${x}" cy="${y}" r="${isHQ?5:3.4}" fill="${isHQ?'#f5b942':'#7fc2ff'}" stroke="#0a0f18" stroke-width="1"/>`;
    s+=`<text class="maplabel" x="${x+7}" y="${y+3.5}" style="fill:${isHQ?'#f5b942':'#9fb0c7'}">${h}</text>`;
  });});
  return s+`</svg>`;
}

function networkGraph(opts={}){
  const W=620,H=420,cx=W/2,cy=H/2;
  let s=`<svg viewBox="0 0 ${W} ${H}" width="100%" style="background:#0a0f18;border-radius:10px">`;
  const n=CORRESPONDENTS.length;
  const nodes=CORRESPONDENTS.map((c,i)=>{const a=-Math.PI/2+i/n*Math.PI*2;return {c,x:cx+Math.cos(a)*175,y:cy+Math.sin(a)*150};});
  nodes.forEach(nd=>{ const w=0.5+nd.c[2]/13*3.5; const rel=nd.c[4];
    const col=rel>99?"#37d39a":rel>98?"#9be36a":rel>97?"#ffb13d":"#ff5d6c";
    s+=`<line x1="${cx}" y1="${cy}" x2="${nd.x}" y2="${nd.y}" stroke="${col}" stroke-width="${w}" opacity="0.5" class="flow"/>`;});
  // CAB hub
  s+=`<circle class="pulse" cx="${cx}" cy="${cy}" r="7" fill="#f5b942"/><circle cx="${cx}" cy="${cy}" r="20" fill="#1a1304" stroke="#f5b942" stroke-width="1.5"/>`;
  s+=`<text x="${cx}" y="${cy+3}" text-anchor="middle" style="fill:#f5b942;font-weight:700;font-size:11px;font-family:var(--mono)">CAB</text>`;
  nodes.forEach((nd,i)=>{ const rel=nd.c[4]; const col=rel>99?"#37d39a":rel>98?"#9be36a":rel>97?"#ffb13d":"#ff5d6c";
    s+=`<circle cx="${nd.x}" cy="${nd.y}" r="${6+nd.c[2]/13*5}" fill="#0e1521" stroke="${col}" stroke-width="1.6" style="cursor:pointer"/>`;
    const anchor = nd.x<cx?'end':'start'; const dx=nd.x<cx?-(7+nd.c[2]/13*5):(7+nd.c[2]/13*5);
    s+=`<text x="${nd.x+dx}" y="${nd.y+3}" text-anchor="${anchor}" style="fill:var(--ink2);font-size:9.5px;font-family:var(--mono)">${nd.c[0]}</text>`;
  });
  return s+`</svg>`;
}

function renderKPIs(m){

    {k:"Economic Profit",v:'<span style="color:'+epColor(m.ep)+'">'+F.m(m.ep)+'</span>',d:m.ep-b.ep,df:F.signm,good:1},
    {k:"Adj. EBITDA",v:F.m0(m.ebitda),d:m.ebitda-b.ebitda,df:F.signm,good:1},
    {k:"Total Income",v:F.m0(m.income),d:m.income-b.income,df:F.signm,good:1},
    {k:"Cost / Income",v:F.pct(m.cir),d:m.cir-b.cir,df:x=>F.signbp(x*10000),good:-1},
    {k:"Intrinsic value (12×)",v:F.m0(m.ebitda*12),d:(m.ebitda-b.ebitda)*12,df:F.signm,good:1}
  ];
  document.getElementById("kpis").innerHTML = items.map(it=>{
    const ch=Math.abs(it.d)>0.0001;
    const cls = ch ? ((it.d*it.good)>=0?"pos":"neg") : "dim3";

    return `<div class="kpi" id="kpi-${it.k}"><div class="k">${it.k}</div><div class="v">${it.v}</div><div class="d">${dtxt}</div></div>`;
  }).join("");
}

function concentration(vals){
  const sorted=[...vals].sort((a,b)=>b-a); const tot=sorted.reduce((a,b)=>a+b,0);
  const W=480,H=220,pl=36,pb=28,pt=10;
  let cum=0; const pts=[[0,0]]; sorted.forEach((v,i)=>{cum+=v;pts.push([(i+1)/sorted.length,cum/tot]);});
  const X=x=>pl+(W-pl-14)*x, Y=y=>H-pb-(H-pb-pt)*y;
  let s=`<svg viewBox="0 0 ${W} ${H}" width="100%">`;
  s+=`<line class="gridln" x1="${X(0)}" y1="${Y(0)}" x2="${X(1)}" y2="${Y(1)}"/>`;
  s+=`<polyline points="${pts.map(p=>X(p[0])+','+Y(p[1])).join(' ')}" fill="none" stroke="#f5b942" stroke-width="2"/>`;
  s+=`<line class="axis" x1="${pl}" y1="${pt}" x2="${pl}" y2="${H-pb}"/><line class="axis" x1="${pl}" y1="${H-pb}" x2="${W-14}" y2="${H-pb}"/>`;
  s+=`<text x="${(pl+W)/2}" y="${H-6}" text-anchor="middle" style="fill:var(--ink3);font-size:9px">share of corridors (ranked)</text>`;
  s+=`<text transform="translate(11,${(pt+H-pb)/2}) rotate(-90)" text-anchor="middle" style="fill:var(--ink3);font-size:9px">cumulative revenue</text>`;
  return s+`</svg>`;
}

function applyScenario(id){ selectedScenario = (selectedScenario===id?null:id); refresh(); }
VIEWS.fscenario=function(m){
  const b=baseSnapshot();
  const cards=FSCEN.map(s=>{
    const on=selectedScenario===s[0];
    return `<div class="card" style="cursor:pointer;${on?'border-color:var(--gold)':''}" onclick="applyScenario('${s[0]}')">
      <div style="display:flex;justify-content:space-between;align-items:baseline"><b style="font-size:12.5px">${s[1]}</b>${on?'<span class="tag gold">SELECTED</span>':'<span class="btn sm">run</span>'}</div>
      <div class="flowtag" style="font-size:10.5px;line-height:1.5;margin-top:6px">${s[2]}</div></div>`;
  }).join("");
  let impact='<div class="card" style="margin-top:14px"><div class="note dim">Select a scenario above to model its impact on the bank.</div></div>';
  if(selectedScenario){
    const s=FSCEN.find(x=>x[0]===selectedScenario);
    const inc=b.income+s[3], cashOpex=b.cashOpex+s[4], eb=inc-cashOpex;
    const pbt=eb-b.amort-b.da-b.adjusting, net=pbt-Math.max(0,pbt)*TAXR;
    const roe=net/b.equity, ep=net-COE*b.equity, cir=(cashOpex+b.amort+b.da)/inc, val=eb*5.8;
    const row=(lab,base,now,fmt,good)=>{const d=now-base;const cls=Math.abs(d)<0.0005?'dim3':((d*good)>=0?'pos':'neg');return `<tr><td class="l">${lab}</td><td>${fmt(base)}</td><td style="color:#fff">${fmt(now)}</td><td class="${cls}">${d>=0?'+':'−'}${fmt(Math.abs(d))}</td></tr>`;};
    impact=`<div class="card" style="margin-top:14px"><div class="ch"><h3>IMPACT — ${s[1].toUpperCase()}</h3><span class="tag ${(net-b.netProfit)>=0?'pos':'neg'}">${F.signm(net-b.netProfit)} net profit</span></div>
      <div class="grid2">
        <table><thead><tr><th class="l">Metric</th><th>Base</th><th>Scenario</th><th>Δ</th></tr></thead><tbody>
          ${row('Revenue',b.income,inc,F.m0,1)}
          ${row('Adj. EBITDA',b.ebitda,eb,F.m0,1)}
          ${row('Cost / income',b.cir,cir,F.pct,-1)}
          ${row('ROE',b.roe,roe,F.pct,1)}
          ${row('Economic profit',b.ep,ep,F.m,1)}
          ${row('Market value',b.ebitda*5.8,val,F.m0,1)}
        </tbody></table>
        <div><div class="note"><b>What's happening.</b> ${s[2]}</div><div class="divider"></div>
          <div class="note"><b style="color:#f5b942">What management should do.</b> ${s[5]}</div></div>
      </div></div>`;
  }
  return `
  <div class="viewhead"><div><div class="kicker">Decisions · Scenario engine</div>
    <h2>The biggest opportunities and threats — next five years</h2>
    <p>Board-level shocks, run through the same economic engine. Pick one to see the hit to revenue, EBITDA, ROE and value — and the recommended response.</p></div></div>
  <div class="grid4">${cards}</div>
  ${impact}`;
};

function answer(qraw){
  const m=compute(), b=baseSnapshot(), q=qraw.toLowerCase();
  const neg=m.corr.filter(c=>c.ep<0), top=[...m.corr].sort((a,b)=>b.ep-a.ep).slice(0,3);
  const has=(...w)=>w.some(x=>q.includes(x));
  let html="";
  if(has("roe","return on equity")&&has("why","move","driver","change")||q.includes("why did roe")){
    const dr=[["FX margin",(m.fx-b.fx)],["volume",(m.payments-b.payments+m.trade-b.trade)],["rates",((m.nii-m.liqUplift)-(b.nii-b.liqUplift))],["compliance",-(m.compliance-b.compliance)],["liquidity",(m.liqUplift-b.liqUplift)],["actions",(m.actRev-m.actCost)]].filter(d=>Math.abs(d[1])>0.05).sort((a,b)=>Math.abs(b[1])-Math.abs(a[1]));
    html=`ROE is <b class="k">${F.pct(m.roe)}</b> versus a baseline of <b class="k">${F.pct(b.roe)}</b> — a move of <b class="k">${F.signbp((m.roe-b.roe)*10000)}</b>. ${dr.length?'The drivers, in order of impact: '+dr.map(d=>`${d[0]} <span class="k">${F.signm(d[1])}</span>`).join(', ')+'.':'You are at baseline — pull a lever to see ROE respond.'} Against a <b>${F.pct0(COE)}</b> cost of equity that is <b>${m.ep>=0?'value-creating':'value-destroying'}</b> economic profit of <b class="k">${F.signm(m.ep)}</b>.`;
  } else if(has("corridor","lane","route")&&has("destroy","worst","leak","negative","bad","losing")){
    html=`<b>${neg.length} corridors</b> currently destroy value, costing <b class="k">${F.m(neg.reduce((a,c)=>a+c.ep,0))}</b> of economic profit: ${neg.map(c=>`<b>${c.c[0]}→${c.c[1]}</b> (${c.c[2]}) <span class="k">${F.signm(c.ep)}</span>`).join(', ')}. The pattern is clear — high financial-crime load and capital charge on thin frontier flows. <b>Reprice +18bps or re-route</b> and each turns positive.`;
  } else if(has("corridor","lane")&&has("best","top","profit","creat","strong")){
    html=`Your top value-creating corridors: ${top.map(c=>`<b>${c.c[0]}→${c.c[1]}</b> <span class="k">${F.signm(c.ep)}</span>`).join(', ')}. Together the positive book generates <b class="k">${F.m(m.corr.filter(c=>c.ep>0).reduce((a,c)=>a+c.ep,0))}</b>. These are the relationships to defend and clone.`;
  } else if(has("exit","offboard")&&has("mto","client","sub-scale","subscale","tail")){
    const x=compute(scenario,{exitmto:true,exitgov:true});
    html=`Exiting the sub-scale MTO cluster and the legacy government payroll would lift economic profit by <b class="k">${F.signm(x.ep-b.ep)}</b> and ROE by <b class="k">${F.signbp((x.roe-b.roe)*10000)}</b> — while <b>freeing ~£5m of capital and ${F.m0(8)} of liquidity</b>. They run negative EP today: revenue doesn't cover their compliance and capital. <span class="chip" onclick="applied.exitmto=true;applied.exitgov=true;refresh();renderRight();openConsole()">▶ apply both</span>`;
  } else if(has("compliance","kyc","aml","financial crime","sanction")){
    html=`Compliance costs <b class="k">${F.m(m.compliance)}</b> this scenario (base ${F.m(BASE.compliance)}). Frontier corridors (NGN, GHS, CDF, SLE) absorb the bulk. <b>Perpetual KYC + ML triage automation cuts it ~37% (£4.4m)</b> with no revenue loss — the single highest-certainty ROE move. <span class="chip" onclick="setLever('complianceAutomationPct',60);renderRight();openConsole()">▶ automate to 60%</span>`;
  } else if(has("liquidity","trapped","nostro","funding")){
    html=`<b>£118m of nostro liquidity is trapped</b> (USD/NGN buffers, capital-controlled balances). Redeploying it into earning assets adds net interest income — releasing 40% lifts income by <b class="k">~£1.4m</b> and ROE by <b class="k">~20bps</b>. <span class="chip" onclick="setLever('liquidityReleasePct',40);renderRight();openConsole()">▶ release 40%</span>`;
  } else if(has("valuation","worth","value","ipo","list","multiple","shareholder","share price","cheap","re-rate","rerate")){
    html=`CABP trades at <b class="k">${BASE.sharePence}p</b> (~£${BASE.mktCap}m, ~5.8× EBITDA) — a depressed multiple set by the 2023 profit warning, down from £851m at IPO. On a payments-peer multiple of 12×, the same <b>${F.m0(m.ebitda)}</b> of adjusted EBITDA is worth <b class="k">${F.m0(m.ebitda*12)}</b> — a re-rating gap of <b class="k">${F.m0(m.ebitda*12-m.ebitda*5.8)}</b>. The margin (29.8%) and growth are already there; the action programme is what closes the gap and moves the rating.`;
  } else if(has("cost","avoidable","expense","efficiency")){
    html=`Total cost is <b class="k">${F.m0(m.opex+m.compliance+m.network+m.funding+m.da)}</b> at a <b>${F.pct(m.cir)}</b> cost-income ratio. About <b class="k">£11m is structurally avoidable</b>: manual KYC rework (£4.4m), trapped-liquidity funding (£2.4m), sub-scale correspondent fees (£1.6m), failed-payment repair (£1.3m), duplicate tooling (£1.1m). The Action Centre converts each into an ROE number.`;
  } else if(has("client","relationship","customer")){
    const sc=[...m.clients].sort((a,b)=>b.ep-a.ep);
    html=`Your most profitable relationship is <b>${sc[0].cl[0]}</b> at <b class="k">${F.signm(sc[0].ep)}</b> EP; the weakest is <b>${sc[sc.length-1].cl[0]}</b> at <b class="k">${F.signm(sc[sc.length-1].ep)}</b>. ${m.clients.filter(c=>c.ep<0).length} relationships destroy value. Concentration is healthy — the top 3 MTOs and DFIs carry the book.`;
  } else if(has("currency","ccy","fx pair")){
    const byCcy={};m.corr.forEach(o=>byCcy[o.c[2]]=(byCcy[o.c[2]]||0)+o.ep);const arr=Object.entries(byCcy).sort((a,b)=>b[1]-a[1]);
    html=`Best currencies by economic profit: ${arr.slice(0,3).map(e=>`<b>${e[0]}</b> <span class="k">${F.signm(e[1])}</span>`).join(', ')}. Worst: ${arr.slice(-3).map(e=>`<b>${e[0]}</b> <span class="k">${F.signm(e[1])}</span>`).join(', ')}. NGN and KES are the economic engines; CDF, SLE and ZMW are the drains.`;
  } else if(has("build","solution","product","opportunit","what should we","value leak","modules")){
    html=`Six deployable modules run on this engine, each closing a named value leak: ${SOLUTIONS.map(s=>`<b>${s[0]}</b> <span class="k">+${F.m(s[3])}</span>`).join(', ')}. Combined gross opportunity <b class="k">+${F.m(SOLUTIONS.reduce((a,s)=>a+s[3],0))}</b> EBITDA / ~+${SOLUTIONS.reduce((a,s)=>a+s[4],0).toFixed(1)}pp ROE before overlaps. The Action Centre lays them out as a build programme.`;
  } else if(has("source","provenance","real vs","made up","made-up","method","portab","modular","framework","nationwide","other bank","chief of staff")){
    html=methodReadout();
  } else if(has("summary","read-out","readout","overview","brief","how are we","state")){
    html=twinSummary(m,b);
  } else {
    html=`I read the live model. Try one of these — or ask about any corridor, client, currency, cost line or the valuation:`;
  }
  return html;
}
function twinSummary(m,b){

<b class="k" style="color:#37d39a">● Public (from filings)</b> — listed as <b>CAB Payments Holdings (LSE: CABP)</b>: share price ~80p, market cap ~£203m (IPO July 2023 at 335p / £851m); FY25 income £119m, adj. EBITDA £35m (29.8% margin), EPS 6.8p; FY24 ROE 10.81%, CET1 £126.3m, total assets £1.82bn; FX/payment volume £41.9bn, 592 active clients, 120 currencies / 800 pairs, 30+ central-bank and 390 local-bank relationships; £13.5bn moved for humanitarian and development purposes in 2024; plus the published analyst consensus. <i>Sources: CAB Payments FY24–FY25 results & annual report; LSE market data; listed-peer filings.</i><br><br>
<b class="k" style="color:#3fa9ff">● Derived</b> — ROE, cost of equity, economic profit, cost-income, capital & liquidity ratios and valuation multiples: modelled from the public figures and listed-peer ratios.<br><br>
<b class="k" style="color:#ffb13d">● Illustrative</b> — the corridor / client / correspondent / nostro line items are realistic <b>placeholders</b> shaped to CAB's known footprint (frontier African corridors, MTO/DFI/central-bank clients, Citi/StanChart/Ecobank correspondents). Trade-finance and per-transaction detail aren't public — these are plausible stand-ins. <b>Swap in the bank's own ledgers and every number becomes real; the engine doesn't change.</b><br><br>

  const exit=[['Sub-scale MTO cluster','38 names below economic threshold'],['Value-destroying lanes','CDF, SLE, Pacific run negative EP'],['Legacy government payroll','sub-economic mandate']];
  const board=(title,col,items)=>`<div class="card"><div class="ch"><h3 style="color:${col}">${title}</h3></div>${items.map(i=>`<div style="padding:8px 0;border-bottom:1px solid var(--line)"><div style="font-size:12px;font-weight:600;color:#fff">${i[0]}</div><div class="flowtag" style="font-size:10.5px">${i[1]}</div></div>`).join('')}</div>`;
  const scen=FSCEN.map(s=>{const inc=b.income+s[3],eb=inc-(b.cashOpex+s[4]);const pbt=eb-b.amort-b.da-b.adjusting;const net=pbt-Math.max(0,pbt)*TAXR;return {s,roeD:(net/b.equity-b.roe)*100};});
  return `
  <div class="viewhead"><div><div class="kicker">Strategy & plan</div>
    <h2>Where to grow, fix and exit</h2>
    <p>Where to <b style="color:#37d39a">invest and grow</b>, what to <b style="color:#f5b942">fix now</b>, and what to <b style="color:#ff5d6c">exit</b> — and the scenarios that help or hurt. Tick a move below to model its impact on returns.</p></div>
    <div style="text-align:right"><div class="scenbadge">applied programme</div><div class="mono" style="font-size:20px;color:${(m.roe-b.roe)>=0?'var(--pos)':'var(--neg)'}">${F.signbp((m.roe-b.roe)*10000)} ROE</div></div></div>
  <div class="grid3" style="margin-bottom:14px">
    ${board('▲ GROW / INVEST','#37d39a',grow)}
    ${board('● FIX NOW','#f5b942',fix)}
    ${board('▼ EXIT','#ff5d6c',exit)}
  </div>
  <div class="grid2">
    <div class="card"><div class="ch"><h3>WHAT WE CAN DO — TICK TO MODEL</h3><span class="meta">impact ripples through every tab</span></div>
      ${ACTIONS.map(a=>{const one=compute(scenario,{[a[0]]:true});const d=(one.roe-b.roe)*10000;const on=!!applied[a[0]];return `<div class="actpick" onclick="toggleAction('${a[0]}')"><div class="chk ${on?'on':''}">${on?'✓':''}</div><div style="flex:1"><div style="font-size:12px;font-weight:600;color:#fff">${a[1]}</div><div class="flowtag" style="font-size:10px">${a[2]}</div></div><div class="mono" style="color:${d>=0?'var(--pos)':'var(--neg)'};font-size:12px">${F.signbp(d)} ROE</div></div>`;}).join('')}
      ${Object.keys(applied).length?`<div style="text-align:right;margin-top:10px"><span class="btn sm" onclick="resetScenario()">reset</span></div>`:''}</div>
    <div class="card"><div class="ch"><h3>MACRO SCENARIOS — GOOD &amp; BAD</h3><span class="meta">5-year shocks → ROE</span></div>
      ${hbars(scen.map(x=>({label:x.s[1].length>26?x.s[1].slice(0,24)+'…':x.s[1],value:x.roeD,disp:F.signbp(x.roeD*100),color:x.roeD>=0?'#37d39a':'#ff5d6c'})),{diverging:true,w:520,rowH:26,labelW:175})}
      <div class="flowtag" style="margin-top:6px">AI / compliance automation is the big upside; stablecoin disruption and a Nigeria devaluation are the big downside risks.</div></div>
  </div>`;
};

renderNav(); renderRight(); refresh();
</script>
